<!DOCTYPE html>
<!--
  This file exists solely so Netlify's build bot can detect and register
  the "contact" form. The actual form is rendered by React; submissions
  are sent via fetch() in Contact.tsx. Do not delete this file.
-->
<html lang="en">
  <head><meta charset="UTF-8" /><title>Form registration</title></head>
  <body>
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input type="text"   name="bot-field" />
      <input type="text"   name="name" />
      <input type="email"  name="email" />
      <input type="tel"    name="phone" />
      <input type="text"   name="company" />
      <select name="service">
        <option value="SEO Optimization">SEO Optimization</option>
        <option value="Website Design &amp; Development">Website Design &amp; Development</option>
        <option value="Paid Advertising (PPC)">Paid Advertising (PPC)</option>
        <option value="Reputation Management">Reputation Management</option>
        <option value="Branding">Branding</option>
        <option value="Conversion Optimization">Conversion Optimization</option>
        <option value="Other / Not Sure">Other / Not Sure</option>
      </select>
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
